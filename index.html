<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aircraft & Pilot Maintenance Calendar</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef2f7;
    color: #172033;
  }

  header {
    background: #0f172a;
    color: white;
    padding: 28px;
    text-align: center;
  }

  header h1 {
    margin: 0;
    font-size: 34px;
  }

  .summary {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .summary div {
    padding: 14px 24px;
    border-radius: 14px;
    font-weight: bold;
  }

  .red { background: #dc2626; color: white; }
  .orange { background: #f97316; color: white; }
  .green { background: #16a34a; color: white; }

  .container {
    max-width: 1200px;
    margin: 25px auto;
    padding: 0 18px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 20px;
  }

  .panel, .card {
    background: white;
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,.08);
  }

  label {
    display: block;
    font-weight: bold;
    margin-top: 12px;
  }

  input, select, textarea, button {
    width: 100%;
    box-sizing: border-box;
    margin-top: 6px;
    padding: 11px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    font-size: 15px;
  }

  button {
    background: #0f172a;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 18px;
    font-weight: bold;
  }

  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }

  .toolbar button {
    width: auto;
    margin-top: 0;
    padding: 10px 16px;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 15px;
  }

  .card {
    border-left: 10px solid #16a34a;
  }

  .card.warning {
    background: #fff7ed;
    border-left-color: #f97316;
  }

  .card.overdue {
    background: #fef2f2;
    border-left-color: #dc2626;
  }

  .card h3 {
    margin: 0 0 8px;
  }

  .badge {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 999px;
    color: white;
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .small {
    color: #475569;
    font-size: 14px;
  }

  .delete {
    background: #991b1b;
  }

  @media (max-width: 850px) {
    .container {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<header>
  <h1>Aircraft & Pilot Maintenance Calendar</h1>
  <p>Track inspections, pilot currency, medicals, flight reviews, and owner/operator reminders.</p>

  <div class="summary">
    <div class="red" id="overdueCount">0 Overdue</div>
    <div class="orange" id="warningCount">0 Due Soon</div>
    <div class="green" id="currentCount">0 Current</div>
  </div>
</header>

<div class="container">

  <section class="panel">
    <h2>Add Item</h2>

    <label>Type</label>
    <select id="type">
      <option>Aircraft</option>
      <option>Pilot</option>
    </select>

    <label>Category</label>
    <input id="category" placeholder="Inspection, Currency, Medical, AD, etc." />

    <label>Item Name</label>
    <input id="title" placeholder="Annual Inspection, Night Currency, ELT Battery..." />

    <label>Last Completed</label>
    <input id="lastDone" type="date" />

    <label>Due Date</label>
    <input id="dueDate" type="date" />

    <label>Interval / Rule</label>
    <input id="interval" placeholder="12 calendar months, 90 days, 24 months..." />

    <label>Notes</label>
    <textarea id="notes" placeholder="Shop, logbook reference, regulation note, etc."></textarea>

    <button onclick="addItem()">Add to Calendar</button>
  </section>

  <main>
    <div class="toolbar">
      <button onclick="setFilter('All')">All</button>
      <button onclick="setFilter('Aircraft')">Aircraft</button>
      <button onclick="setFilter('Pilot')">Pilot</button>
      <button onclick="loadDefaults()">Load Sample Items</button>
      <button onclick="clearAll()" class="delete">Clear All</button>
    </div>

    <div class="cards" id="cards"></div>
  </main>

</div>

<script>
let items = JSON.parse(localStorage.getItem("maintenanceItems")) || [];
let filter = "All";

document.getElementById("lastDone").valueAsDate = new Date();
document.getElementById("dueDate").valueAsDate = new Date();

function save() {
  localStorage.setItem("maintenanceItems", JSON.stringify(items));
}

function daysUntil(dateString) {
  const today = new Date();
  today.setHours(0,0,0,0);

  const due = new Date(dateString + "T00:00:00");
  return Math.ceil((due - today) / (1000 * 60 * 60 * 24));
}

function getStatus(dueDate) {
  const days = daysUntil(dueDate);
  if (days < 0) return "overdue";
  if (days <= 30) return "warning";
  return "current";
}

function statusText(dueDate) {
  const days = daysUntil(dueDate);

  if (days < 0) return `${Math.abs(days)} days overdue`;
  if (days === 0) return "Due today";
  return `Due in ${days} days`;
}

function addItem() {
  const item = {
    id: Date.now(),
    type: document.getElementById("type").value,
    category: document.getElementById("category").value,
    title: document.getElementById("title").value,
    lastDone: document.getElementById("lastDone").value,
    dueDate: document.getElementById("dueDate").value,
    interval: document.getElementById("interval").value,
    notes: document.getElementById("notes").value
  };

  if (!item.title || !item.dueDate) {
    alert("Please enter at least an item name and due date.");
    return;
  }

  items.push(item);
  save();
  render();
}

function deleteItem(id) {
  items = items.filter(item => item.id !== id);
  save();
  render();
}

function setFilter(newFilter) {
  filter = newFilter;
  render();
}

function clearAll() {
  if (confirm("Clear all saved items?")) {
    items = [];
    save();
    render();
  }
}

function loadDefaults() {
  items = [
    {
      id: 1,
      type: "Aircraft",
      category: "Inspection",
      title: "Annual Inspection",
      lastDone: "2025-04-10",
      dueDate: "2026-04-30",
      interval: "12 calendar months",
      notes: "Required for most small aircraft operating under Part 91."
    },
    {
      id: 2,
      type: "Aircraft",
      category: "Avionics",
      title: "Transponder Check",
      lastDone: "2024-09-15",
      dueDate: "2026-09-30",
      interval: "24 calendar months",
      notes: "Track for aircraft using transponder-required airspace."
    },
    {
      id: 3,
      type: "Aircraft",
      category: "IFR",
      title: "Altimeter / Static System Check",
      lastDone: "2024-09-15",
      dueDate: "2026-09-30",
      interval: "24 calendar months",
      notes: "Needed for IFR operations in controlled airspace."
    },
    {
      id: 4,
      type: "Aircraft",
      category: "Emergency",
      title: "ELT Inspection",
      lastDone: "2025-06-01",
      dueDate: "2026-06-30",
      interval: "12 calendar months",
      notes: "Also track ELT battery replacement separately."
    },
    {
      id: 5,
      type: "Pilot",
      category: "Currency",
      title: "Day Passenger Currency",
      lastDone: "2026-02-14",
      dueDate: "2026-05-14",
      interval: "3 takeoffs and landings in preceding 90 days",
      notes: "Same category/class/type if type rating required."
    },
    {
      id: 6,
      type: "Pilot",
      category: "Currency",
      title: "Night Passenger Currency",
      lastDone: "2026-01-15",
      dueDate: "2026-04-15",
      interval: "3 full-stop night landings in preceding 90 days",
      notes: "For carrying passengers at night."
    },
    {
      id: 7,
      type: "Pilot",
      category: "Proficiency",
      title: "Flight Review",
      lastDone: "2025-03-20",
      dueDate: "2027-03-31",
      interval: "24 calendar months",
      notes: "Commonly called a BFR."
    },
    {
      id: 8,
      type: "Pilot",
      category: "IFR",
      title: "Instrument Currency",
      lastDone: "2026-02-01",
      dueDate: "2026-08-31",
      interval: "6 calendar months",
      notes: "Track approaches, holding, and intercepting/tracking."
    }
  ];

  save();
  render();
}

function render() {
  const cards = document.getElementById("cards");
  cards.innerHTML = "";

  let overdue = 0;
  let warning = 0;
  let current = 0;

  const visibleItems = items
    .filter(item => filter === "All" || item.type === filter)
    .sort((a, b) => daysUntil(a.dueDate) - daysUntil(b.dueDate));

  visibleItems.forEach(item => {
    const status = getStatus(item.dueDate);

    if (status === "overdue") overdue++;
    if (status === "warning") warning++;
    if (status === "current") current++;

    const badgeClass =
      status === "overdue" ? "red" :
      status === "warning" ? "orange" :
      "green";

    const card = document.createElement("div");
    card.className = `card ${status === "warning" ? "warning" : ""} ${status === "overdue" ? "overdue" : ""}`;

    card.innerHTML = `
      <span class="badge ${badgeClass}">
        ${status === "overdue" ? "PAST DUE" : status === "warning" ? "DUE SOON" : "CURRENT"}
      </span>

      <h3>${item.title}</h3>

      <p><strong>${item.type}</strong> · ${item.category}</p>

      <p><strong>Last Done:</strong> ${item.lastDone || "Not entered"}</p>
      <p><strong>Due Date:</strong> ${item.dueDate}</p>
      <p><strong>Status:</strong> ${statusText(item.dueDate)}</p>

      <p class="small"><strong>Interval:</strong> ${item.interval || "Not entered"}</p>
      <p class="small">${item.notes || ""}</p>

      <button class="delete" onclick="deleteItem(${item.id})">Delete</button>
    `;

    cards.appendChild(card);
  });

  document.getElementById("overdueCount").textContent = `${overdue} Overdue`;
  document.getElementById("warningCount").textContent = `${warning} Due Soon`;
  document.getElementById("currentCount").textContent = `${current} Current`;
}

render();
</script>

</body>
</html>
